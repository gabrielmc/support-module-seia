name: CI/CD - Build, Test and Deploy (Python)

on:
  push:
    branches:
      - master
  pull_request:

env:
  APP_NAME: mini-mundo-project
  PYTHON_VERSION: '3.11'
  DEPLOY_ENV: staging

jobs:
  build:
    name: 🏗️ Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout source code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🔍 Check project structure
        run: |
          echo "📁 Root:"
          ls -la
          echo "📁 app:"
          ls -la app
          echo "📁 tests:"
          ls -la tests

      - name: 🧪 Run tests
        run: |
          pytest tests --verbose

      - name: 📤 Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-artifact
          path: |
            app
            requirements.txt

  quality-gate:
    name: 🔍 Quality Gate
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: 📥 Checkout source code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 📦 Install quality tools
        run: |
          pip install flake8 bandit

      - name: 🧹 Lint (flake8)
        run: |
          echo "🔍 Running flake8..."
          flake8 app --max-line-length=120

      - name: 🛡️ Security scan (bandit)
        run: |
          echo "🛡️ Running bandit..."
          bandit -r app

      - name: ✅ Quality Gate Result
        run: |
          echo "✅ Code quality approved"

  deploy:
    name: 🚀 Deploy Simulation
    runs-on: ubuntu-latest
    needs: quality-gate

    steps:
      - name: 📥 Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-artifact

      - name: 📋 Pre-deploy checks
        run: |
          echo "🔍 Checking environment variables..."
          echo "🌎 Environment: $DEPLOY_ENV"
          echo "📦 Artifact content:"
          ls -la

      - name: 🚀 Deploy application (SIMULATION)
        run: |
          echo "🚀 Starting deployment..."
          sleep 2
          echo "📦 Uploading application..."
          sleep 2
          echo "🔄 Restarting service..."
          sleep 2
          echo "✅ Deployment completed successfully (simulation)"

      - name: ❤️ Post-deploy health check
        run: |
          echo "❤️ Running health check..."
          sleep 2
          echo "✅ Application is healthy"

      - name: 📝 Deployment summary
        run: |
          echo "=============================="
          echo "🚀 DEPLOY SUMMARY"
          echo "Application: $APP_NAME"
          echo "Environment: $DEPLOY_ENV"
          echo "Status: SUCCESS"
          echo "=============================="
